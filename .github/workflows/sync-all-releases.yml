# .github/workflows/sync-all-releases.yml
name: 同步所有上游 Release Tags

on:
  workflow_dispatch:   # 手动触发，避免自动运行导致大量同步
  # schedule:          # 可选：定时执行（谨慎使用，避免频繁同步大量 tags）
  #   - cron: '0 0 * * 0'  # 每周一次

permissions:
  contents: write

jobs:
  # 任务1: 获取上游所有 Release tags
  fetch-tags:
    runs-on: ubuntu-latest
    outputs:
      tag_list: ${{ steps.get-tags.outputs.tag_list }}
      count: ${{ steps.get-tags.outputs.count }}
    steps:
      - name: 获取上游所有 Release Tags
        id: get-tags
        run: |
          OWNER="Linuxoid-cn"
          REPO="Mi8G3-Unlocker"
          API_URL="https://api.github.com/repos/$OWNER/$REPO/releases"
          
          # 循环获取所有分页的 releases
          TAGS=()
          PAGE=1
          while true; do
            RESPONSE=$(curl -s "$API_URL?page=$PAGE&per_page=100")
            # 检查是否还有数据
            COUNT=$(echo "$RESPONSE" | jq length)
            if [ "$COUNT" -eq 0 ]; then
              break
            fi
            # 提取 tag_name 并添加到数组
            PAGE_TAGS=$(echo "$RESPONSE" | jq -r '.[].tag_name')
            while IFS= read -r tag; do
              if [ -n "$tag" ]; then
                TAGS+=("$tag")
              fi
            done <<< "$PAGE_TAGS"
            ((PAGE++))
            # 防止无限循环（最多20页，2000个 releases）
            if [ $PAGE -gt 20 ]; then
              echo "警告: 达到最大页数限制，可能未获取完全"
              break
            fi
          done
          
          # 输出 JSON 数组
          JSON_TAGS=$(jq -c -n '$ARGS.positional' --args "${TAGS[@]}")
          echo "tag_list=$JSON_TAGS" >> $GITHUB_OUTPUT
          echo "count=${#TAGS[@]}" >> $GITHUB_OUTPUT
          echo "共发现 ${#TAGS[@]} 个 Release tags"
          
          # 打印前10个 tags 作为预览
          echo "前10个 tags: ${TAGS[@]:0:10}"

  # 任务2: 并行处理每个 tag（矩阵）
  sync-tag:
    needs: fetch-tags
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # 单个 tag 失败不影响其他
      matrix:
        tag: ${{ fromJson(needs.fetch-tags.outputs.tag_list) }}
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置当前 tag
        id: current
        run: echo "tag=${{ matrix.tag }}" >> $GITHUB_OUTPUT

      # 检查上游该 tag 是否存在（保险起见，虽然是从上游列表来的，但以防万一）
      - name: 验证上游 Release 存在
        id: check
        run: |
          TAG="${{ steps.current.outputs.tag }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://api.github.com/repos/Linuxoid-cn/Mi8G3-Unlocker/releases/tags/$TAG)
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "错误：上游 Release $TAG 不存在 (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "上游存在 Release: $TAG"

      # 删除本仓库已存在的同名 Release 和 Tag
      - name: 删除本仓库已存在的同名 Release 和 Tag
        run: |
          TAG="${{ steps.current.outputs.tag }}"
          
          # 删除 release (如果存在)
          if gh release view "$TAG" &>/dev/null; then
            echo "删除已存在的 release: $TAG"
            gh release delete "$TAG" --yes
          else
            echo "本仓库不存在 release $TAG"
          fi
          
          # 删除本地 tag (如果存在)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "删除本地 tag: $TAG"
            git tag -d "$TAG"
          fi
          
          # 删除远程 tag (如果存在)
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "删除远程 tag: $TAG"
            git push origin :refs/tags/"$TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 下载上游该 tag 的 Release assets
      - name: 下载上游 Release Assets
        run: |
          TAG="${{ steps.current.outputs.tag }}"
          mkdir -p "downloaded_$TAG"
          cd "downloaded_$TAG"
          gh release download "$TAG" --repo Linuxoid-cn/Mi8G3-Unlocker --pattern '*' --clobber
          echo "下载完成: $TAG"
          ls -la
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 创建本仓库 Release 并上传资产
      - name: 创建 Release 并上传资产
        run: |
          TAG="${{ steps.current.outputs.tag }}"
          DOWNLOAD_DIR="downloaded_$TAG"
          
          if [ ! -d "$DOWNLOAD_DIR" ] || [ -z "$(ls -A $DOWNLOAD_DIR)" ]; then
            echo "错误：没有下载到任何文件，退出"
            exit 1
          fi
          
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "自动同步自上游 [Linuxoid-cn/Mi8G3-Unlocker](https://github.com/Linuxoid-cn/Mi8G3-Unlocker/releases/tag/$TAG)" \
            --target main \
            "$DOWNLOAD_DIR"/*
          
          rm -rf "$DOWNLOAD_DIR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 可选：在 main 分支记录已同步的版本（如果需要全局记录，但会导致每次同步都提交，建议禁用或改为汇总 job）
      # 这里不记录单个 tag，避免大量提交污染历史

  # 可选：汇总报告（记录哪些 tag 同步成功/失败）
  summary:
    needs: [fetch-tags, sync-tag]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 输出同步总结
        run: |
          echo "## 同步完成" >> $GITHUB_STEP_SUMMARY
          echo "上游仓库: Linuxoid-cn/Mi8G3-Unlocker" >> $GITHUB_STEP_SUMMARY
          echo "总共处理 tags: ${{ needs.fetch-tags.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "请检查上方的 job 详情确认各个 tag 是否成功。" >> $GITHUB_STEP_SUMMARY
