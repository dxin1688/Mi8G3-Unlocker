# .github/workflows/manual-sync-release.yml
name: 手动同步指定 Tag 的 Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '要同步的上游 Release Tag (例如: v6.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 获取完整历史，以便操作 tag

      # 1. 获取用户输入的 tag
      - name: 设置 tag 变量
        id: input
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "target_tag=$TAG" >> $GITHUB_OUTPUT
          echo "目标 Tag: $TAG"

      # 2. 检查上游该 tag 是否存在
      - name: 检查上游 Release 是否存在
        id: check_upstream
        run: |
          TAG="${{ steps.input.outputs.target_tag }}"
          # 使用 GitHub API 检查该 tag 对应的 release 是否存在
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://api.github.com/repos/Linuxoid-cn/Mi8G3-Unlocker/releases/tags/$TAG)
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "upstream_exists=true" >> $GITHUB_OUTPUT
            echo "上游存在 Release: $TAG"
          else
            echo "upstream_exists=false" >> $GITHUB_OUTPUT
            echo "错误：上游不存在 Release $TAG (HTTP $HTTP_CODE)"
            exit 1
          fi

      # 3. 如果本仓库已存在同名 tag 或 release，先删除
      - name: 删除本仓库已存在的同名 Release 和 Tag
        if: steps.check_upstream.outputs.upstream_exists == 'true'
        run: |
          TAG="${{ steps.input.outputs.target_tag }}"
          
          # 删除 release (如果存在)
          if gh release view "$TAG" &>/dev/null; then
            echo "删除已存在的 release: $TAG"
            gh release delete "$TAG" --yes
          else
            echo "本仓库不存在 release $TAG"
          fi
          
          # 删除本地和远程的 tag (如果存在)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "删除本地 tag: $TAG"
            git tag -d "$TAG"
          fi
          # 删除远程 tag
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "删除远程 tag: $TAG"
            git push origin :refs/tags/"$TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. 下载上游指定 tag 的 Release assets
      - name: 下载上游 Release Assets
        if: steps.check_upstream.outputs.upstream_exists == 'true'
        run: |
          TAG="${{ steps.input.outputs.target_tag }}"
          mkdir -p downloaded_release
          cd downloaded_release
          gh release download "$TAG" --repo Linuxoid-cn/Mi8G3-Unlocker --pattern '*' --clobber
          echo "下载完成，文件列表："
          ls -la
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. 创建本仓库 Release 并上传资产
      - name: 创建 Release 并上传资产
        if: steps.check_upstream.outputs.upstream_exists == 'true'
        run: |
          TAG="${{ steps.input.outputs.target_tag }}"
          
          # 确保下载目录存在且非空
          if [ ! -d "downloaded_release" ] || [ -z "$(ls -A downloaded_release)" ]; then
            echo "错误：没有下载到任何文件，退出"
            exit 1
          fi
          
          # 创建 release，并将所有文件作为附件上传
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "手动同步自上游 [Linuxoid-cn/Mi8G3-Unlocker](https://github.com/Linuxoid-cn/Mi8G3-Unlocker/releases/tag/$TAG)" \
            --target main \
            downloaded_release/*
          
          # 可选：在 main 分支中记录版本号（小文件）
          echo "$TAG" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: 手动同步版本 $TAG" || echo "无版本变更"
          git push origin main
          
          # 清理临时目录
          rm -rf downloaded_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
